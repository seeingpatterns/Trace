<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinegraph — 영화 임베딩 성좌도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="loading" id="loading">
  <h2>Cinegraph</h2>
  <p>LOADING CONSTELLATION...</p>
</div>

<div class="header">
  <h1><span>C</span>inegraph</h1>
  <div class="header-right">56 Films<br>Neural Constellation</div>
</div>

<div class="search-wrap">
  <input type="text" class="search-input" id="search" placeholder="영화 검색..." autocomplete="off">
</div>

<div class="treasure-banner" id="treasure-banner"></div>
<div class="legend" id="legend"></div>
<div class="counter" id="counter">56 films</div>
<div class="hint">drag to rotate · scroll to zoom</div>

<div class="find-panel" id="find-panel">
  <input type="text" id="find-input" placeholder="내 아이디를 입력하세요" autocomplete="off">
  <button id="find-btn">내 별 찾기</button>
  <button class="reset-btn" id="reset-btn">초기화</button>
</div>

<div class="film-card" id="card">
  <div class="card-year" id="card-year"></div>
  <div class="card-title" id="card-title"></div>
  <div class="card-title-en" id="card-title-en"></div>
  <div class="card-meta" id="card-meta"></div>
  <div class="card-desc" id="card-desc"></div>
  <div class="card-note" id="card-note"></div>
  <div class="card-review" id="card-review"></div>
  <button class="card-review-btn" id="card-review-btn">감상평 쓰기</button>
  <div class="card-comments" id="card-comments"></div>
  <div class="card-comment-form" id="card-comment-form" style="display:none">
    <textarea id="comment-textarea" placeholder="답글을 남겨주세요..." rows="2"></textarea>
    <button id="comment-submit-btn">답글 달기</button>
  </div>
</div>

<div class="review-modal" id="review-modal">
  <div class="review-modal-content">
    <div class="review-modal-title" id="review-modal-title"></div>
    <textarea id="review-textarea" placeholder="감상평을 적어주세요..." rows="5"></textarea>
    <input type="password" id="review-password" placeholder="비밀번호">
    <div class="review-modal-actions">
      <button id="review-submit-btn">저장</button>
      <button id="review-cancel-btn" class="cancel">취소</button>
    </div>
    <div class="review-modal-error" id="review-modal-error"></div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
